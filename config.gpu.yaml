# ============================================================================
# GPU / RunPod profile — higher-capacity models for best accuracy.
# Run with:  python run.py --config config.gpu.yaml unsupervised
# `device: auto` resolves to cuda on a GPU pod automatically.
# ============================================================================

paths:
  data_dir: data
  outputs_dir: outputs
  models_dir: models

data:
  drop_annotated_suffix: "_m"
  image_glob: "*.png"

detect:
  backend: sam2                  # SAM 2.1 — much cleaner masks than MobileSAM
  weights: sam2.1_l.pt           # large; drop to sam2.1_b.pt if VRAM-limited
  device: auto
  imgsz: 1024
  max_images: null
  min_area_frac: 0.0004
  max_area_frac: 0.45
  min_crop_px: 24
  crop_padding: 6
  ignore_corner_frac: [0.18, 0.10]

embed:
  model_name: facebook/dinov2-giant   # 1536-d, strongest DINOv2 (baked into the image)
  device: auto
  batch_size: 32                 # giant is heavier; raise if VRAM allows
  image_size: 224
  pooling: cls

cluster:
  reducer: umap                  # umap separates morphotypes better (install umap-learn)
  pca_components: 50
  l2_normalize: true
  algorithm: hdbscan
  hdbscan:
    min_cluster_size: 15
    min_samples: null
    metric: euclidean
  kmeans:
    n_clusters: 12

review:
  thumbs_per_cluster: 36
  thumb_size: 128

classify:
  method: knn
  knn_k: 15

seed: 42
