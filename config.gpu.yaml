# ============================================================================
# GPU / RunPod profile — higher-capacity models for best accuracy.
# Run with:  python run.py --config config.gpu.yaml unsupervised
# `device: auto` resolves to cuda on a GPU pod automatically.
# ============================================================================

paths:
  data_dir: data
  outputs_dir: outputs
  models_dir: models

data:
  drop_annotated_suffix: "_m"
  image_glob: "*.png"

detect:
  backend: sam2                  # SAM 2.1 — much cleaner masks than MobileSAM
  weights: sam2.1_l.pt           # large; drop to sam2.1_b.pt if VRAM-limited
  device: auto
  imgsz: 1536                    # frames are 2048x1500; raise to 2048 for max detail if VRAM allows
  preprocess: clahe              # boosts faint, low-contrast translucent organisms
  max_images: null
  # HIGH-RECALL post-filters: keep small cells (junk is handled later via a
  # "discard" cluster). Lower min_area_frac/min_crop_px = fewer real cells lost.
  min_area_frac: 0.0001          # ~17px blob on a 2048x1500 frame
  max_area_frac: 0.45            # still reject whole-background blobs
  min_crop_px: 14
  crop_padding: 6
  ignore_corner_frac: [0.18, 0.10]
  min_focus: 0.0                 # keep blurry crops (recall first; discard later)
  sam:                           # SAM2 "segment everything" tuned for RECALL (more masks, more junk)
    points_stride: 64            # dense grid (default 32) -> catches small/thin objects between points
    conf_thres: 0.62             # predicted-IoU floor (default 0.88); low = keep uncertain masks
    stability_score_thresh: 0.85 # (default 0.95); low = keep flaky masks
    crop_n_layers: 1             # extra pass on image crops -> big recall gain on small objects (slower)
    crop_nms_thresh: 0.8         # less aggressive de-dup between crops -> keep more

embed:
  model_name: facebook/dinov2-giant   # 1536-d, strongest DINOv2 (baked into the image)
  device: auto
  batch_size: 32                 # giant is heavier; raise if VRAM allows
  image_size: 224
  pooling: cls

cluster:
  reducer: umap                  # cluster in UMAP space (separates morphotypes far better)
  pca_components: 50             # only used if umap is unavailable
  l2_normalize: true
  min_focus: 0                   # drop crops below this var-of-Laplacian before clustering (0 = off); cheap, reuses embeddings
  umap:
    n_components: 10             # cluster in this many UMAP dims (not 2-D)
    n_neighbors: 15
    min_dist: 0.0                # recommended when UMAP output feeds a clusterer
    metric: cosine
  algorithm: hdbscan
  hdbscan:
    min_cluster_size: 10         # lower (6/4) for more, finer groups; raise to merge
    min_samples: 5               # lower than min_cluster_size = fewer noise points
    metric: euclidean            # euclidean in the UMAP space
    cluster_selection_method: eom   # eom (fewer, larger) | leaf (more, finer, homogeneous)
    cluster_selection_epsilon: 0.0  # >0 merges nearby clusters; keep 0 for finer separation
  kmeans:
    n_clusters: 12

review:
  thumbs_per_cluster: 36
  thumb_size: 128

classify:
  method: knn
  knn_k: 15

seed: 42
