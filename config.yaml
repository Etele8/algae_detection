# ============================================================================
# Configuration for the unsupervised algae detection / clustering pipeline.
# Every stage reads from this file so a run is fully reproducible.
# ============================================================================

paths:
  data_dir: data                 # input microscopy images (*.png)
  outputs_dir: outputs           # all generated artifacts
  models_dir: models             # downloaded / cached model weights

data:
  # The microscope software exports an annotated copy of some frames with a
  # "_m" suffix (yellow measurement overlays). These are near-duplicates of a
  # clean frame, so by default we keep the clean image and drop the "_m" twin.
  drop_annotated_suffix: "_m"
  image_glob: "*.png"

detect:
  backend: mobile_sam            # mobile_sam | sam2 | sam | fastsam | classical
  weights: null                  # null -> sensible default per backend (auto-downloaded)
  device: auto                   # auto -> cuda if available, else cpu
  imgsz: 1024                    # inference resolution for the segmenter
  max_images: null               # null = all; set small (e.g. 3) for quick tests
  # Filter masks to plausible organism sizes (fraction of total image area).
  min_area_frac: 0.0004          # ignore tiny debris / specks
  max_area_frac: 0.45            # ignore huge background blobs
  min_crop_px: 24                # discard crops smaller than this on a side
  crop_padding: 6                # pixels of context padded around each mask
  # A scale bar / label is burned into the bottom-right corner of every frame;
  # ignore detections whose center falls inside this corner band.
  ignore_corner_frac: [0.18, 0.10]   # [width_frac, height_frac] of bottom-right

embed:
  model_name: facebook/dinov2-small   # dinov2-small (384d) | dinov2-base (768d)
  device: auto
  batch_size: 16
  image_size: 224                # crops resized to this for the ViT
  # Use the CLS token (global descriptor) as the object embedding.
  pooling: cls                   # cls | mean

cluster:
  reducer: pca                   # pca | umap (umap optional, needs umap-learn)
  pca_components: 50             # reduce embedding dim before clustering
  l2_normalize: true             # normalize embeddings (cosine-like geometry)
  algorithm: hdbscan             # hdbscan | kmeans
  hdbscan:
    min_cluster_size: 8
    min_samples: null            # null -> defaults to min_cluster_size
    metric: euclidean            # on L2-normalized vectors ~= cosine
  kmeans:
    n_clusters: 12

review:
  thumbs_per_cluster: 36         # max thumbnails per cluster contact sheet
  thumb_size: 128

classify:
  # For assigning new/unlabeled objects after the researcher names clusters.
  method: knn                    # knn over the embedding space
  knn_k: 15

seed: 42
